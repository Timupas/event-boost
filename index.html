<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/event-boost/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vanilla App Template</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/2.0.0/modern-normalize.min.css"
      integrity="sha512-4xo8blKMVCiXpTaLzQSLSw3KFOVPWhm/TRtuPVc4WG6kUgjH6J03IBuG7JZPkcWMxJ5huwaBpOpnwYElP/m6wg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    
    <link rel="stylesheet" href="./css/styles.css" />
    <script type="module" crossorigin src="/event-boost/commonHelpers.js"></script>
    <link rel="stylesheet" href="/event-boost/assets/index-b1569602.css">
  </head>
  <body>

    <!-- Loads the specified .html file -->
    <header class="header" id="top">
    <div class="container">
        <a href="./header.html" class="header__link"><img src="/event-boost/assets/logo-head-4258f148.png" alt="" class="header__image"></a>
        <h1 class="header__title">FIND BEST EVENTS AROUND THE WORLD</h1>


        <form action="" class="header__form">
            <div class="header__icon">
                <input type="text" class="header__input" placeholder="Start searching">
                <svg class="header__icons-start" width="12" height="12">
                    <use href="/event-boost/assets/search-42c7bad2.svg"></use>
                </svg>
            </div>
            <div class="header__icon country">
                <input type="text" class="header__input" id="countryInput" placeholder="Choose country" readonly />
                <svg class="header__icons" width="12" height="12">
                    <use href="/event-boost/assets/downarr-62cff0a7.svg"></use>
                </svg>
                <ul class="country-list"></ul>
            </div>
        </form>

    </div>
</header>
    <section class="events">
    <div class="container">
<ul class="events-list" data-id="${ev.id}"></ul>

<div class="pagination" id="pagination"></div>
    </div>
</section>
    
    <div class="backdrop backdrop-hidden" data-modal>
  <div class="modal">
    <button class="modal-close-btn" data-close>✕</button>
    <div class="modal__wrap"></div>
  </div>
</div>

    
  </body>
</html>
